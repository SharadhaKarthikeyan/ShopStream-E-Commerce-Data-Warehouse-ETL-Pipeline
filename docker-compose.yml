version: '3.8'

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.7.1}
  environment:
    &airflow-common-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__LOGGING_LEVEL: INFO
    AIRFLOW__CORE__DASK_LOGGING_LEVEL: WARNING
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    _PIP_ADDITIONAL_PACKAGES: "dbt-postgres pandas sqlalchemy psycopg2-binary faker python-dotenv"
    DBT_PROFILES_DIR: /opt/airflow/dbt_ecommerce
    DBT_PROJECT_DIR: /opt/airflow/dbt_ecommerce
    DB_HOST: postgres
    DB_PORT: 5432
    DB_USER: ${DB_USER:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-postgres}
    DB_NAME: ${DB_NAME:-shopstream_dw}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt_ecommerce:/opt/airflow/dbt_ecommerce
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./reports:/opt/airflow/reports
    - ./sql:/opt/airflow/sql
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    environment:
      <<: *airflow-common-env
      _PIP_ADDITIONAL_PACKAGES: ""
    user: "0:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt_ecommerce:/opt/airflow/dbt_ecommerce
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./reports:/opt/airflow/reports
      - ./sql:/opt/airflow/sql
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin

volumes:
  pgdata:
