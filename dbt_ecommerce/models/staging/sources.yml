version: 2

sources:
  - name: raw
    description: "Raw relational e-commerce tables generated by scripts/generate_data.py"
    schema: raw
    tables:
      - name: customers
        description: "Customer profile and contact records"
      - name: products
        description: "Catalog of items for sale"
      - name: orders
        description: "Orders placed by customers"
      - name: order_items
        description: "Individual products purchased per order"
      - name: payments
        description: "Transaction details for orders"
      - name: shipments
        description: "Delivery tracking records"
      - name: refunds
        description: "Customer refund claims and amounts"
      - name: marketing_campaigns
        description: "Promotional campaigns driven via social, email, etc."
